name: Update VM Scores
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python update_scores.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add index.html sioov/index.html
          git diff --staged --quiet || git commit -m "update scores"
          git push
